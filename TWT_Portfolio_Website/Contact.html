<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWT Studios - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <div class="side-nav">
        <a href="index.html" class="nav-btn green">Home</a>
        <a href="about.html" class="nav-btn purple">About</a>
        <a href="projects.html" class="nav-btn orange">Games</a>
        <a href="contact.html" class="nav-btn red">Contact</a>
    </div>

    <header id="mainHeader" class="d-flex justify-content-between align-items-center fixed-top px-4 px-md-5" style="height: 80px;">
        <div class="logo">TWT Studios</div>
        <button id="hamburgerBtn" class="menu-btn">☰</button>
    </header>

    <section class="container-fluid p-0 contact-section" style="margin-top: 80px;">
        <div class="row g-0 min-vh-100">
            <div class="col-lg-6 d-flex justify-content-center align-items-center p-5 contact-image">
                <img src="Files/Logo_Design.png" alt="TWT Studios Logo" class="img-fluid">
            </div>

            <div class="col-lg-6 p-5 contact-content d-flex flex-column justify-content-center">
                <h2>Get In Touch</h2>
                <p class="mb-4">Have a job opportunity or a question?<br>I'd love to hear from you.</p>

                <!-- REPLACE YOUR_FORM_ID_HERE WITH YOUR FORMS PREE ID -->
                <form class="contact-form" action="https://formspree.io/f/mojodoyn" method="POST">
                    <div class="row g-4">
                        <div class="col-12 col-md-6">
                            <input type="text" name="name" placeholder="Your Name" class="w-100" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <input type="email" name="email" placeholder="Your Email" class="w-100" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <input type="tel" name="phone" placeholder="Your Phone" class="w-100">
                        </div>
                        <div class="col-12 col-md-6">
                            <input type="text" name="subject" placeholder="Subject" class="w-100">
                        </div>
                        <div class="col-12">
                            <textarea name="message" placeholder="Your Message" class="w-100" required></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="border-0">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="d-flex justify-content-center align-items-center" style="height: 120px; border-top: 1px solid #222; background: #0b0b0b;">
        <div class="logo">TWT Studios</div>
    </footer>

    <button id="backToTop" class="back-to-top" title="Go to top">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
