<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWT Studios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles.css">
</head>
<body>

    <div class="side-nav">
        <a href="index.html" class="nav-btn green">Home</a>
        <a href="about.html" class="nav-btn purple">About</a>
        <a href="projects.html" class="nav-btn orange">Games</a>
        <a href="Contact.html" class="nav-btn red">Contact</a>
    </div>

    <header id="mainHeader" class="d-flex justify-content-between align-items-center fixed-top px-4 px-md-5" style="height: 80px;">
        <div class="logo">TWT Studios</div>
    </header>

    <section class="hero w-100">
        <video id="introVideo" autoplay muted playsinline>
            <source src="Files/Animated Logo_Design.mp4" type="video/mp4">
        </video>
        <img id="logoImage" src="Files/Logo_Design.png" alt="TWT Studios Logo">
    </section>

    <script>
        const video = document.getElementById("introVideo");
        const image = document.getElementById("logoImage");
        image.style.display = "none";
        video.addEventListener("ended", () => {
            video.style.display = "none";
            image.style.display = "block";
        });
    </script>

    <section class="container main-content py-5 d-flex flex-column align-items-center">
        
        <div class="name-section text-center w-100 mb-5">
            <div class="name-box">THABANG THOBEJANE</div>
            <div class="titles-box d-flex justify-content-center flex-wrap gap-3 mt-3">
                <span>Level Designer</span>
                <span>Game Developer</span>
                <span>Programmer</span>
            </div>
        </div>

        <div class="featured-section w-100 mb-4">
            <h2 class="text-center mb-5">Featured projects</h2>
            <div class="row g-4 justify-content-center">
                <div class="col-6 col-md-3">
                    <div class="project-circle"><img src="Files/BoomMenu.png" alt="Boom Game"></div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="project-circle"><img src="Files/SpacePic.png" alt="Space Game"></div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="project-circle"><img src="Files/TetherMenu.png" alt="Tether"></div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="project-circle"><img src="Files/MatchPic.png" alt="Placeholder"></div>
                </div>
            </div>
        </div>

        <div class="about-text text-center mt-3" style="max-width: 800px;">
            <p>An aspiring and young game developer who gets work done, is versatile, gets along well with people and is not afraid to ask for help.</p>
        </div>

    </section>

    <footer class="d-flex justify-content-center align-items-center" style="height: 120px; border-top: 1px solid #222; background: #0b0b0b;">
        <div class="logo">TWT Studios</div>
    </footer>

    <button id="backToTop" class="back-to-top" title="Go to top">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Functions.js"></script>
</body>
</html>
